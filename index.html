    <h1>Delivery Guarantees Simulator — Event-Driven Architecture</h1>
    <p>
      This is an interactive, browser-based simulator built for teaching
      <strong>delivery guarantees in Event-Driven Architecture (EDA)</strong>.
      It visualizes the full <em>Producer → Broker → Consumer → Database</em> flow
      with animated messages, injectable failures and live metrics.
    </p>
    <h2>Scenarios covered</h2>
    <ul>
      <li><strong>At-most-once</strong> — fire-and-forget; messages can be lost.</li>
      <li><strong>At-least-once</strong> — retry until ACK; messages can be duplicated. Toggle consumer-side idempotency to see the bug appear and disappear.</li>
      <li><strong>Exactly-once</strong> — broker-side deduplication and transactional commits.</li>
      <li><strong>Dead Letter Queue (DLQ)</strong> — poison messages that exceed MaxDeliveryCount are dead-lettered instead of retried forever.</li>
    </ul>
    <h2>Brokers modeled</h2>
    <ul>
      <li>Azure Service Bus (PeekLock, duplicate detection, native DLQ)</li>
      <li>Azure Service Bus with Sessions (FIFO per session)</li>
      <li>Azure Event Hubs (Kafka-like, no native DLQ)</li>
      <li>Azure Event Grid (HTTP pub/sub, dead-letter to Blob Storage)</li>
      <li>Azure Storage Queue (visibility timeout)</li>
      <li>RabbitMQ (publisher confirms, manual ack, DLX)</li>
      <li>Apache Kafka (idempotent producer + transactions; dead-letter topic pattern)</li>
    </ul>
    <p>
      <strong>JavaScript is required</strong> to run the simulator. Please enable it,
      or view the source on
      <a href="https://github.com/CristianoRC/EDA-Delivery-Guarantees">GitHub</a>.
    </p>
